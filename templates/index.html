<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Chatbot</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="chat-container">

    <div class="header">

        <div>
            <h2>🤖 AI Chatbot</h2>
            <small>Welcome!</small>
        </div>

        <div>

            <button id="themeBtn">
                🌙
            </button>

            <a href="/logout">
                <button>
                    Logout
                </button>
            </a>

        </div>

    </div>

    <div id="chat-box">

        <div class="bot-message">
            Hello! 👋<br>
            How can I help you today?
        </div>

    </div>

    <div class="input-area">

        <input
        type="text"
        id="user-input"
        placeholder="Type your message...">

        <button id="voiceBtn">
            🎤
        </button>

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
